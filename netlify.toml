[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY,NEXT_PUBLIC_CONVEX_URL,NEXT_PUBLIC_DODO_MONTHLY_PRODUCT_ID,NEXT_PUBLIC_DODO_ANNUAL_PRODUCT_ID,NEXT_PUBLIC_DODO_PUBLISHABLE_KEY"
  SECRETS_SCAN_OMIT_PATHS = ".next/**,node_modules/**,dist/**,build/**"

[[plugins]]
  package = "@netlify/plugin-nextjs"
